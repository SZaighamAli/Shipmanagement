<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sea Route Shipmanagement — CFO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
:root{
  --p:#334e68;--p2:#4a6580;--p3:#5e7d99;--ac:#b56576;
  --g:#6b9080;--y:#cc9544;--r:#b56576;--gr:#64748b;
  --bg:#faf8f4;--card:#ffffff;--bd:#e7e2d8;--tx:#2d3748;
}
body{background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}
header{background:linear-gradient(135deg,#334e68 0%,#486581 50%,#5e7d99 100%);color:#fff;padding:22px 28px 16px;box-shadow:0 2px 12px rgba(51,78,104,.12);position:sticky;top:0;z-index:100}
.credit-line{position:absolute;top:6px;right:18px;font-size:10.5px;color:rgba(255,255,255,.62);font-weight:500;letter-spacing:.04em;z-index:1}
.credit-line strong{font-weight:600;color:rgba(255,255,255,.85)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px;max-width:1700px;margin:0 auto}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{width:46px;height:46px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.brand h1{font-size:19px;font-weight:700;letter-spacing:-.01em}
.brand .sub{font-size:12px;opacity:.92;font-weight:500;margin-top:2px;display:flex;align-items:center;gap:8px}
.tag{display:inline-block;padding:2px 9px;background:rgba(255,255,255,.18);color:#fff;border-radius:12px;font-size:11px;font-weight:600}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:11px;opacity:.85;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:-2px}
.filter{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;padding:8px 14px;border-radius:7px;font-size:13px;cursor:pointer;outline:none;min-width:130px;font-weight:500;transition:all .15s}
.filter:hover,.filter:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4)}
.filter option{background:var(--p);color:#fff}
nav{background:#fff;border-bottom:1px solid var(--bd);padding:0 28px;overflow-x:auto;display:flex;position:sticky;top:75px;z-index:99;box-shadow:0 1px 0 rgba(0,0,0,.03);max-width:1700px;margin:0 auto}
nav button{background:none;border:none;padding:14px 18px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
nav button svg{width:15px;height:15px;opacity:.7}
nav button:hover{color:var(--p);background:#f9fafb}
nav button.active{color:var(--p);border-bottom-color:var(--p)}
nav button.active svg{opacity:1}
main{padding:24px 28px;max-width:1700px;margin:0 auto}
.tab{display:none;animation:fade .25s}
.tab.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-23{grid-template-columns:2fr 1fr}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3,.grid-23{grid-template-columns:1fr}}
@media(max-width:700px){.grid-4,.grid-3,.grid-2,.grid-23{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(74,79,82,.06),0 1px 2px rgba(74,79,82,.04);border:1px solid var(--bd);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.card-flat{box-shadow:none}
.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title h3{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em}
.card-title .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(15,52,96,.08);color:var(--p)}
.kpi-card{position:relative;overflow:hidden}
.kpi-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--p)}
.kpi-card.up::before{background:var(--g)}
.kpi-card.dn::before{background:var(--r)}
.kpi-val{font-size:28px;font-weight:700;color:var(--p);letter-spacing:-.02em;line-height:1.15}
.kpi-sub{font-size:12px;color:#6b7280;margin-top:5px;display:flex;align-items:center;gap:8px}
.spark{height:34px;margin-top:10px;width:100%}
.kpi-up{color:var(--g);font-weight:600}.kpi-down{color:var(--r);font-weight:600}
.section-title{font-size:17px;font-weight:700;color:var(--p);margin:28px 0 14px;display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.section-title svg{width:20px;height:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f1e8;text-align:left;padding:11px 13px;font-weight:600;color:#374151;border-bottom:2px solid var(--bd);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:11px 13px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fdfbf6}
.num{text-align:right;font-variant-numeric:tabular-nums}
.pos{color:var(--g);font-weight:600}.neg{color:var(--r);font-weight:600}
.chart-wrap{position:relative;height:340px;margin-top:8px}
.chart-wrap-tall{position:relative;height:480px;margin-top:8px}
.chart-wrap-sm{position:relative;height:240px;margin-top:8px}
.badge{display:inline-block;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.b-actual{background:#dde9e2;color:#3a5a4d}
.b-budget{background:#f5e6cf;color:#7a5b1a}
.b-fcst{background:#e7e2d8;color:#4a5568}
.b-warn{background:#f0d8d3;color:#8c3d35}
.b-ok{background:#dde6ec;color:#334e68}
.commentary{background:linear-gradient(135deg,#fdf9ee 0%,#f9f1dc 100%);border-left:4px solid #cc9544;padding:18px 22px;border-radius:8px;margin-top:18px}
.commentary h4{color:#7a5b1a;font-size:13px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.commentary p{color:#6b4f1d;font-size:13px;line-height:1.7;margin-top:6px}
.bar-row{display:grid;grid-template-columns:220px 1fr 110px;gap:14px;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6}
.bar-row .label{font-size:13px;font-weight:600}
.bar-row .label .sub{font-size:11px;color:#6b7280;font-weight:400;margin-top:2px}
.bar-row .bar{height:28px;border-radius:5px;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:12px;font-weight:700}
.bar-pos{background:linear-gradient(90deg,#10b981,#059669)}
.bar-neg{background:linear-gradient(90deg,#ef4444,#dc2626)}
.bar-start{background:linear-gradient(90deg,var(--p),var(--p2))}
.bar-end{background:linear-gradient(90deg,var(--p3),#2563eb)}
.bar-row .val{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:13px;color:var(--p)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
.scen-actual{background:#6b9080}.scen-budget{background:#cc9544}.scen-fcst{background:#a8a29e}
.legend{display:flex;gap:18px;font-size:12px;color:#4b5563;margin:6px 0 18px;align-items:center;flex-wrap:wrap}
.legend .label-bold{font-weight:700;color:var(--p);margin-right:6px}
.dd-cal-wrap{overflow-x:auto;margin-top:10px}
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.vessel-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all .2s}
.vessel-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08);border-color:#5e7d99}
.vessel-card .vname{font-size:14px;font-weight:700;color:var(--p)}
.vessel-card .vmeta{font-size:11px;color:#6b7280;display:flex;justify-content:space-between}
.vessel-card .vstats{display:flex;justify-content:space-between;align-items:flex-end;padding-top:8px;border-top:1px solid #f3f4f6}
.vessel-card .vstats .ebitda{font-size:18px;font-weight:700;color:var(--p)}
.vessel-card .vstats .ebitda.neg{color:var(--r)}
.vessel-card .vstats .util{font-size:11px;color:#6b7280;text-align:right}
.alert{padding:13px 17px;background:#faf0ed;color:#8c3d35;border:1px solid #e8ccc6;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.tile{background:#fff;border-radius:10px;padding:14px;border:1px solid var(--bd)}
.tile h4{font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;margin-bottom:6px;letter-spacing:.05em}
.tile .v{font-size:22px;font-weight:700;color:var(--p);line-height:1.1}
.tile .v.neg{color:var(--r)}
.tile .sub{font-size:11px;color:#6b7280;margin-top:4px}
.hero{background:linear-gradient(135deg,#334e68 0%,#486581 50%,#5e7d99 100%);color:#fff;border-radius:14px;padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:260px;height:260px;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><circle cx='100' cy='100' r='80' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='40'/></svg>") no-repeat;opacity:.6}
.hero h2{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px}
.hero p{font-size:13px;opacity:.92;max-width:780px;line-height:1.6}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:18px;position:relative;z-index:1}
.hero-stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 14px;backdrop-filter:blur(4px)}
.hero-stat .lbl{font-size:10px;font-weight:600;opacity:.85;text-transform:uppercase;letter-spacing:.05em}
.hero-stat .val{font-size:20px;font-weight:700;margin-top:4px}
.jd-row{display:grid;grid-template-columns:1fr 2fr 100px;gap:14px;padding:10px 12px;border-radius:6px;font-size:13px;align-items:center;border-bottom:1px solid #f3f4f6}
.jd-row:hover{background:#fafbfc}
.jd-row .req{font-weight:600;color:var(--p);font-size:13px}
.jd-row .mapped{color:#4b5563;font-size:12px}
.jd-row .where{text-align:right}
.jd-row .where .badge{cursor:pointer;background:#dbeafe;color:#1e40af}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent);margin:18px 0}
.fleet-hero-illust{display:flex;justify-content:center;align-items:flex-end;height:80px;margin-top:14px;gap:6px;opacity:.5}
.fleet-hero-illust svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.subtitle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.subtitle-row .sub-info{font-size:12px;color:#6b7280}
.tip{font-size:11px;color:#9ca3af;font-style:italic;margin-top:8px}
.mini-stat{display:inline-block;padding:1px 8px;background:#f3f4f6;border-radius:10px;font-size:10px;color:#374151;font-weight:600}
</style>
</head>

function renderKPI(){
  const rows = filtered();
  const rev = sum(rows,"revenue"), bunker = sum(rows,"bunker"), netRev = sum(rows,"net_revenue");
  const opex = sum(rows,"opex"), ebitda = sum(rows,"ebitda");
  const daysOn = sum(rows,"days_on"), offHire = sum(rows,"off_hire");
  const margin = netRev > 0 ? ebitda/netRev : 0;
  const util = (daysOn+offHire) > 0 ? daysOn/(daysOn+offHire) : 0;
  const scenario = rows.length ? rows[0].scenario : "—";
  const sb = scenario==="Actual"?"actual":scenario==="Budget"?"budget":"fcst";

  // Prior year for trend arrows
  const prior = D.monthly.filter(r => (state.vessel==="ALL" || r.vessel===state.vessel) && r.year===state.year-1);
  const priorNet = sum(prior,"net_revenue");
  const priorEb = sum(prior,"ebitda");
  const priorMg = priorNet>0?priorEb/priorNet:0;
  const dNet = priorNet > 0 ? (netRev-priorNet)/priorNet : 0;
  const dEb = priorEb > 0 ? (ebitda-priorEb)/priorEb : 0;
  const dMg = margin - priorMg;

  // Vessel breakdown
  const byVessel = {};
  filtered().forEach(r => {
    if(!byVessel[r.vessel]) byVessel[r.vessel] = {rev:0, opex:0, ebitda:0, days:0, type:""};

// ============== EBITDA Waterfall ==============
function renderEBITDA(){
  const fy23 = D.monthly.filter(r => r.year===2023 && (state.vessel==="ALL" || r.vessel===state.vessel));
  const fy24 = D.monthly.filter(r => r.year===2024 && (state.vessel==="ALL" || r.vessel===state.vessel));
  const ebFy23 = sum(fy23,"ebitda")/1e6;
  const ebFy24 = sum(fy24,"ebitda")/1e6;
  const wf = JSON.parse(JSON.stringify(D.commentary.ebitda_waterfall));
  wf[0].value = ebFy23; wf[wf.length-1].value = ebFy24;
  let running = ebFy23;
  wf.forEach(w => {
    if(w.type==="start") w.cumStart=0, w.cumEnd=ebFy23;
    else if(w.type==="end") w.cumStart=0, w.cumEnd=ebFy24;
    else if(w.type==="pos"){ w.cumStart=running; running+=w.value; w.cumEnd=running;}
    else if(w.type==="neg"){ w.cumEnd=running; running+=w.value; w.cumStart=running;}
  });
  document.getElementById("t-ebitda").innerHTML = `
    <div class="legend">
      <span class="label-bold">EBITDA Bridge:</span>
      <span><span class="dot" style="background:${C.p}"></span>Starting / Ending</span>
      <span><span class="dot scen-actual"></span>Favourable</span>
      <span><span class="dot" style="background:${C.r}"></span>Adverse</span>
    </div>
    <div class="section-title"><svg><use href="#i-wf"/></svg>FY23 → FY24 EBITDA Bridge (${state.vessel})</div>
    <div class="card"><div class="chart-wrap-tall"><canvas id="ch-ebitda-wf"></canvas></div></div>
    <div class="section-title">Driver Detail</div>
    <div class="card">${wf.map(w => {
      const isBook = w.type==="start"||w.type==="end";
      const cls = isBook?"bar-start":w.value>=0?"bar-pos":"bar-neg";
      const max = Math.max(...wf.map(x=>Math.abs(x.value)||x.cumEnd));
      const pct = Math.min(95, Math.abs(isBook?w.value:w.value)/(max||1)*70+15);
      return `<div class="bar-row">
        <div class="label"><strong>${w.driver}</strong><div class="sub">${isBook?(w.type==='start'?'Baseline':'End-state'):(w.value>=0?'Favourable':'Adverse')+' driver'}</div></div>
        <div style="position:relative;height:28px;background:#f3f4f6;border-radius:5px;overflow:hidden">
          <div class="bar ${cls}" style="width:${pct}%;${isBook||w.value>=0?'':'margin-left:auto'}">${isBook?fmt$M(w.value,1):(w.value>=0?'+':'')+w.value.toFixed(1)+'M'}</div>
        </div>
        <span class="val">${fmt$M(isBook?w.value:w.cumEnd,1)}</span>
      </div>`;
    }).join("")}</div>
    <div class="commentary">
      <h4>💬 CFO Commentary — EBITDA Drivers</h4>
      <p>• <strong>Volume gain ($0.7M)</strong> — 18 additional voyage days fleet-wide vs FY23 from reduced unplanned off-hire.</p>
      <p>• <strong>Rate uplift ($1.1M)</strong> — Q2-Q3 freight market recovery; MSI clean tanker index +12% YoY.</p>
      <p>• <strong>Indian Express full-year ($0.6M)</strong> — entered fleet July 2023, full-year basis in 2024.</p>
      <p>• <strong>Crew inflation (-$0.4M)</strong> — India CPI 5.5% + agency fee uplift on Leonid rotation extension.</p>
      <p>• <strong>R&M overage (-$0.9M)</strong> — Leonid thruster overhaul; insurance hard market (-$0.2M).</p>
      <p>• <strong>Leonid Q4 dry-dock (-$0.3M)</strong> — Revenue loss net of 70% LoH insurance recovery.</p>
    </div>
  `;
  destroyChart("ebitda-wf");
  const ranges = wf.map(w => [w.cumStart, w.cumEnd]);
  const cArr = wf.map(w => w.type==="start"||w.type==="end"?C.p:w.value>=0?C.a:C.r);
  charts["ebitda-wf"] = new Chart(document.getElementById("ch-ebitda-wf"), {
    type:"bar",
    data:{labels: wf.map(w=>w.driver), datasets:[{label:"EBITDA $M", data:ranges, backgroundColor:cArr, borderColor:cArr, borderWidth:1, borderRadius:4}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>{
      const v = wf[c.dataIndex].value;
      return wf[c.dataIndex].type==='start'||wf[c.dataIndex].type==='end'?`Total: ${fmt$M(v*1e6,1)}`:`Δ: ${(v>=0?'+':'')}${v.toFixed(1)}M`;
    }}}}, scales:{y:{ticks:{callback:v=>"$"+v+"M"}}, x:{ticks:{maxRotation:30, minRotation:30, font:{size:10}}}}}
  });
}

// ============== CAPEX Waterfall ==============
function renderCapexW(){
  const wf = JSON.parse(JSON.stringify(D.capex_waterfall));
  wf[wf.length-1].value = wf[0].value + wf.slice(1,-1).reduce((a,b)=>a+b.value,0);
  let running = wf[0].value;
  wf.forEach(w => {
    if(w.type==="start"){ w.cumStart=0; w.cumEnd=w.value;}
    else if(w.type==="end"){ w.cumStart=0; w.cumEnd=w.value;}
    else if(w.type==="adverse"){ w.cumStart=running; running+=w.value; w.cumEnd=running;}
    else { w.cumEnd=running; running+=w.value; w.cumStart=running;}
  });
  document.getElementById("t-capexw").innerHTML = `
    <div class="section-title"><svg><use href="#i-cap"/></svg>CAPEX Bridge — FY24 Budget → FY24 Actual ($M)</div>
    <div class="card"><div class="chart-wrap-tall"><canvas id="ch-capex-wf"></canvas></div></div>
    <div class="card" style="margin-top:14px">${wf.map(w => {
      const isBook = w.type==="start"||w.type==="end";
      const cls = isBook?"bar-start":w.type==="adverse"?"bar-neg":"bar-pos";
      return `<div class="bar-row"><div class="label"><strong>${w.label}</strong><div class="sub">${isBook?(w.type==='start'?'Original budget':'Final actual'):(w.type==='adverse'?'Adverse':'Favourable')}</div></div><div style="position:relative;height:28px;background:#f3f4f6;border-radius:5px"><div class="bar ${cls}" style="width:${Math.min(85,Math.abs(w.value)*100+15)}%">${isBook?fmt$M(w.value,2):(w.value>=0?'+':'')+w.value.toFixed(2)+'M'}</div></div><span class="val">${fmt$M(w.cumEnd,2)}</span></div>`;
    }).join("")}</div>
    <div class="commentary">
      <h4>💬 CAPEX Commentary</h4>
      <p>• <strong>Tiara DD overran budget by $150k</strong> due to additional steel renewal found during inspection.</p>
      <p>• <strong>Lia DD on time/budget</strong> (Drydocks Dubai) — model case for next dry-docks.</p>
      <p>• <strong>$250k maintenance capex deferred</strong> to FY25 (non-critical bridge upgrade on Leo).</p>
      <p>• <strong>INR depreciation</strong> added $50k to Indian yard work cost.</p>
    </div>
  `;
  destroyChart("capex-wf");
  const ranges = wf.map(w => [w.cumStart, w.cumEnd]);
  const cArr = wf.map(w => w.type==="start"||w.type==="end"?C.p:w.type==="adverse"?C.r:C.a);
  charts["capex-wf"] = new Chart(document.getElementById("ch-capex-wf"), {
    type:"bar",
    data:{labels: wf.map(w=>w.label), datasets:[{label:"CAPEX $M", data:ranges, backgroundColor:cArr, borderRadius:4}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>"$"+v+"M"}}}}
  });
}
